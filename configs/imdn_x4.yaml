defaults:
  - base

experiment:
  name: "imdn_x4"

data:
  scale: 4
  patch_size: 64
  batch_size: 32

model:
  name: "imdn"
  scale: 4
  in_channels: 3
  out_channels: 3
  num_features: 64
  num_blocks: 6
  distillation_rate: 0.25

trainer:
  max_epochs: 300
  grad_accumulation_steps: 1
  mixed_precision: true

optimizer:
  type: "Adam"
  lr: 5.0e-4
  betas: [0.9, 0.999]

scheduler:
  type: "MultiStepLR"
  milestones: [150, 250]
  gamma: 0.5
