defaults:
  - base

experiment:
  name: "srgan_x4"

data:
  scale: 4
  patch_size: 96
  batch_size: 16

model:
  name: "srgan"
  scale: 4
  in_channels: 3
  out_channels: 3
  num_resblocks: 16
  num_features: 64

losses:
  pixel:
    type: "L2"
    weight: 1.0e-2
  perceptual:
    type: "vgg"
    layer: "relu2_2"
    weight: 1.0
  adversarial:
    type: "vanilla"
    weight: 1.0e-3

trainer:
  type: "gan"
  max_epochs: 200
  pretrain_epochs: 100        # pixel-loss-only pretraining
  grad_accumulation_steps: 1
  mixed_precision: true

optimizer:
  generator:
    type: "Adam"
    lr: 1.0e-4
    betas: [0.9, 0.999]
  discriminator:
    type: "Adam"
    lr: 1.0e-4
    betas: [0.9, 0.999]

scheduler:
  type: "MultiStepLR"
  milestones: [100]
  gamma: 0.1
