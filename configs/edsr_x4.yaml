defaults:
  - base

experiment:
  name: "edsr_x4"

data:
  scale: 4
  patch_size: 48
  batch_size: 16

model:
  name: "edsr"
  scale: 4
  in_channels: 3
  out_channels: 3
  num_features: 64
  num_resblocks: 16
  res_scale: 0.1
  variant: "baseline"   # "baseline" | "large"

trainer:
  max_epochs: 300
  grad_accumulation_steps: 4
  mixed_precision: true

optimizer:
  type: "Adam"
  lr: 1.0e-4

scheduler:
  type: "MultiStepLR"
  milestones: [200]
  gamma: 0.5
