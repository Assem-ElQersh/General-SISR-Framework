defaults:
  - base

experiment:
  name: "med_sr_x4"

model:
  name: "med_sr"
  scale_z: 4
  in_channels: 1
  out_channels: 1
  num_features: 64
  num_resblocks: 16
  mode: "3d"           # or "slicewise" for the 2D baseline

data:
  train_dataset: "NIfTI"
  val_dataset: "NIfTI"
  data_root: "datasets/mri"
  scale: [4, 1, 1]    # anisotropic: z×4, h×1, w×1
  patch_size_3d: 32
  patches_per_volume: 64
  anisotropic_axis: "z"
  batch_size: 4
  num_workers: 2
  file_ext: ".nii.gz"

losses:
  pixel:
    type: "L1"
    weight: 1.0

trainer:
  max_epochs: 200
  mixed_precision: true
  grad_accumulation_steps: 2

optimizer:
  lr: 1.0e-4

scheduler:
  T_max: 200
  eta_min: 1.0e-6
