defaults:
  - base

experiment:
  name: "espcn_x4"

data:
  scale: 4
  patch_size: 17     # LR patch size; HR is patch_size * scale
  batch_size: 64

model:
  name: "espcn"
  scale: 4
  in_channels: 1
  out_channels: 1
  num_features: 64

trainer:
  max_epochs: 100
  grad_accumulation_steps: 1
  mixed_precision: true

optimizer:
  type: "Adam"
  lr: 1.0e-3

scheduler:
  type: "StepLR"
  step_size: 50
  gamma: 0.1
