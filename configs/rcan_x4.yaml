defaults:
  - base

experiment:
  name: "rcan_x4"

data:
  scale: 4
  patch_size: 48
  batch_size: 8

model:
  name: "rcan"
  scale: 4
  in_channels: 3
  out_channels: 3
  num_features: 64
  num_groups: 10
  num_rcab_per_group: 20
  reduction: 16

trainer:
  max_epochs: 300
  grad_accumulation_steps: 8
  mixed_precision: true

optimizer:
  type: "Adam"
  lr: 1.0e-4

scheduler:
  type: "CosineAnnealingLR"
  T_max: 300
  eta_min: 1.0e-7
