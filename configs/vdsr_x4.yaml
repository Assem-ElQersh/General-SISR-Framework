defaults:
  - base

experiment:
  name: "vdsr_x4"

data:
  scale: 4
  patch_size: 41
  batch_size: 64

model:
  name: "vdsr"
  scale: 4
  in_channels: 1
  out_channels: 1
  num_layers: 20
  num_features: 64

trainer:
  max_epochs: 80
  clip_grad_norm: 0.4

optimizer:
  type: "SGD"
  lr: 0.1
  momentum: 0.9
  weight_decay: 1.0e-4

scheduler:
  type: "StepLR"
  step_size: 20
  gamma: 0.1
