defaults:
  - base

experiment:
  name: "dpsr_x4"

model:
  name: "dpsr"
  scale: 4
  in_channels: 3
  out_channels: 3
  denoiser_layers: 7
  denoiser_features: 64
  num_iter: 15
  mu_start: 0.01
  mu_end: 0.5
  sigma_start: 0.5
  sigma_end: 0.05

data:
  scale: 4
  patch_size: 64
  batch_size: 16

losses:
  pixel:
    type: "L1"
    weight: 1.0
  physics:
    weight: 0.1
    scale: 4

optimizer:
  lr: 1.0e-4
