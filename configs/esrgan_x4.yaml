defaults:
  - base

experiment:
  name: "esrgan_x4"

data:
  scale: 4
  patch_size: 128
  batch_size: 16

model:
  name: "esrgan"
  scale: 4
  in_channels: 3
  out_channels: 3
  num_features: 64
  num_rrdb: 23
  growth_channels: 32

losses:
  pixel:
    type: "L1"
    weight: 0.01
  perceptual:
    type: "vgg"
    layer: "relu3_4"
    weight: 1.0
  adversarial:
    type: "ragan"    # Relativistic average GAN
    weight: 0.005

trainer:
  type: "gan"
  max_epochs: 400
  pretrain_epochs: 50
  grad_accumulation_steps: 1
  mixed_precision: true

optimizer:
  generator:
    type: "Adam"
    lr: 1.0e-4
    betas: [0.9, 0.999]
  discriminator:
    type: "Adam"
    lr: 1.0e-4
    betas: [0.9, 0.999]

scheduler:
  type: "MultiStepLR"
  milestones: [50, 100, 200, 300]
  gamma: 0.5
