defaults:
  - base

experiment:
  name: "mambair_x4"

model:
  name: "mambair"
  scale: 4
  in_channels: 3
  out_channels: 3
  embed_dim: 64
  depths: [6, 6, 6, 6]
  d_state: 16

data:
  scale: 4
  patch_size: 64
  batch_size: 8

trainer:
  max_epochs: 300
  grad_accumulation_steps: 2
  mixed_precision: true

optimizer:
  lr: 2.0e-4
  betas: [0.9, 0.99]
